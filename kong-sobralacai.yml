_format_version: "2.1"

services:
  - name: auth
    url: http://sobralacai_auth:9999
    routes:
      - name: auth-route
        paths: ["/auth/v1"]
    plugins:
      - name: cors
        config:
          origins: ["*"]
          methods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
          headers: ["Authorization", "Content-Type", "apikey", "X-Client-Info"]
          exposed_headers: ["X-Total-Count"]

  - name: rest
    url: http://sobralacai_rest:3000
    routes:
      - name: rest-route
        paths: ["/rest/v1"]
    plugins:
      - name: cors
        config:
          origins: ["*"]
          methods: ["GET", "POST", "PUT", "DELETE", "PATCH", "OPTIONS"]
          headers: ["Authorization", "Content-Type", "apikey", "X-Client-Info", "Prefer"]
          exposed_headers: ["X-Total-Count"]

  - name: storage
    url: http://sobralacai_storage:5000
    routes:
      - name: storage-route
        paths: ["/storage/v1"]
    plugins:
      - name: cors
        config:
          origins: ["*"]
          methods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
          headers: ["Authorization", "Content-Type", "apikey", "X-Client-Info"]
